# GitLab CI configuration for VMS Platform API
include:
  - project: 'codespire-core/ci-templates'
    file: '/complete/react.yml'

test:unit:
    extends: .test:react
    stage: test
    allow_failure: true
    when: never

test:integration:
    extends: .test:react
    stage: test
    allow_failure: true
    when: never
