include:
  - project: 'codespire-solutions-core/ci-templates'
    ref: 'main'
    file: '/stacks/react-vite.yml'

variables:
  GITOPS_REPO: products/creator-platform/deploy
  GITOPS_BRANCH: develop
  ARGOCD_SERVER: argocd.vps.codespiresolutions.com

deploy:dev:
  variables:
    GITOPS_FILE: helm-values/web/values-dev.yaml
    ARGOCD_APP: creator-platform-web-dev

deploy:prd:
  variables:
    GITOPS_FILE: helm-values/web/values-prd.yaml
    ARGOCD_APP: creator-platform-web-prd

# Disable cache on install and build — the pnpm store archive (~500MB+) OOMKills
# the helper container on memory-constrained runners. node_modules are passed
# between jobs via GitLab artifacts so no cache is needed.
pnpm:install:
  cache: []

pnpm:build:
  cache: []

pnpm:test:
  allow_failure: true

pnpm:lint:
  allow_failure: true

pnpm:sonar:
  allow_failure: true
