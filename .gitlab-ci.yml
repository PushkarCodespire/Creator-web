include:
  - project: 'codespire-solutions-core/ci-templates'
    ref: 'main'
    file: '/stacks/react-vite.yml'

variables:
  GITOPS_REPO: products/creator-platform/deploy
  ARGOCD_SERVER: argocd.vps.codespiresolutions.com

deploy:dev:
  variables:
    GITOPS_FILE: helm-values/web/values-dev.yaml
    ARGOCD_APP: creator-platform-web-dev

deploy:prd:
  variables:
    GITOPS_FILE: helm-values/web/values-prd.yaml
    ARGOCD_APP: creator-platform-web-prd

# node_modules arrive as artifacts from pnpm:install — cache restore is
# redundant and OOMKills the helper container on memory-constrained runners.
pnpm:build:
  cache: []

pnpm:test:
  allow_failure: true

pnpm:lint:
  allow_failure: true

pnpm:sonar:
  allow_failure: true
