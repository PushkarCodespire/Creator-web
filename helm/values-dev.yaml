replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""

fullnameOverride: "creator-platform-web"

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

containerPort: 8080

command: []
args: []

env:
  VITE_API_URL: "/api"
  VITE_SOCKET_URL: "wss://crp.dev.gcp.codespiresolutions.com"
  VITE_UPLOAD_PUBLIC_PATH: "/api/upload/image"

  VITE_DEMO_MODE: "false"

  VITE_CHAT_ID_KRISHANSH: ""
  VITE_CHAT_ID_RAGHAV: ""
  VITE_CHAT_ID_RAVYA: ""
envSecret: {}

envFrom: []

livenessProbe:
  enabled: true
  type: httpGet
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  type: httpGet
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  enabled: true
  type: httpGet
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

service:
  type: ClusterIP
  port: 80
  targetPort: ""
  nodePort: ""
  annotations: {}

healthCheckPolicy:
  enabled: true
  path: "/health"
  checkIntervalSec: 15
  timeoutSec: 5
  healthyThreshold: 1
  unhealthyThreshold: 2
  logEnabled: false

httpRoute:
  enabled: true
  annotations: {}
  labels: {}
  parentRefs:
    - name: https-gateway
      namespace: gateway-system
      sectionName: https-dev
  hostnames:
    - crp.dev.gcp.codespiresolutions.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: creator-platform-web
          port: 80
      filters: []
  tls: {}

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

revisionHistoryLimit: 3
minReadySeconds: 0
progressDeadlineSeconds: 600

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""
  customMetrics: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

podAnnotations: {}
podLabels: {}

lifecycle: {}

terminationGracePeriodSeconds: 30

initContainers: []
sidecars: []

extraVolumeMounts: []
extraVolumes: []

networkPolicy:
  enabled: false
  ingress: []
  egress: []

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  labels: {}
  metricRelabelings: []
  relabelings: []
