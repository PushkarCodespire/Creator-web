server {
    # 8080, not 80 — the container runs unprivileged (non-root cannot bind
    # ports < 1024). The react-vite chart routes its Service + probes here.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx scratch/temp paths under /tmp — the only writable mount when the
    # container runs with a read-only root filesystem (chart-provided emptyDir).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml;

    # API / uploads / socket.io proxy snippets — rendered (with
    # ${API_BACKEND_URL}/${WS_BACKEND_URL} substituted) into
    # /tmp/nginx-snippets/ by docker-entrypoint.sh.
    include /tmp/nginx-snippets/*.conf;

    # Health endpoints for the chart's liveness/readiness/startup probes.
    location = /healthz/liveness  { access_log off; default_type text/plain; return 200 "UP\n"; }
    location = /healthz/readiness { access_log off; default_type text/plain; return 200 "UP\n"; }

    # Cache content-hashed asset bundles forever.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Other static (favicons, fonts, root-level images).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Block dotfiles.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SPA fallback — send all non-file requests to index.html.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
