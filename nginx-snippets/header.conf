# Always included. Top of nginx.conf — process model, http opening,
# temp paths (so we can run with readOnlyRootFilesystem=true), gzip,
# and structured access logging.
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Non-root user can't write to /var/cache/nginx/* by default.
  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;

  gzip              on;
  gzip_comp_level   5;
  gzip_min_length   256;
  gzip_proxied      any;
  gzip_vary         on;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/plain
    text/xml;

  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"path":"$request_uri",'
      '"status":$status,'
      '"size":$body_bytes_sent,'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"req_time":$request_time,'
      '"upstream_time":"$upstream_response_time",'
      '"trace_id":"$http_traceparent"'
    '}';
  access_log /dev/stdout json_combined;
