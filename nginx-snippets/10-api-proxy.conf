# Three proxy paths to the creator-platform api service:
#   /api/         REST + WebSocket upgrade
#   /uploads/     direct static uploads served by the api
#   /socket.io/   Socket.IO WebSocket
# ${API_BACKEND_URL} and ${WS_BACKEND_URL} are substituted at container
# startup by docker-entrypoint.sh (WS defaults to API in helm-values).

location /api/ {
    proxy_pass http://${API_BACKEND_URL}/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
}

location /uploads/ {
    proxy_pass http://${API_BACKEND_URL}/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

location /socket.io/ {
    proxy_pass http://${WS_BACKEND_URL}/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_read_timeout 86400s;
}
