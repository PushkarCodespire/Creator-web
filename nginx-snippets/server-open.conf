# Always included. Opens the server { block, sets root + index, applies
# baseline security headers, and serves health probes (which must work
# regardless of whether a backend is configured — the SPA pod's health
# is independent of the backend's).

  server {
    listen ${SERVER_PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- security headers ----
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-Content-Type-Options  "nosniff"            always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---- health probes (handled by nginx, never proxied) ----
    # liveness  → nginx worker is alive and processing requests.
    # readiness → /usr/share/nginx/html/index.html exists on disk.
    #             Catches a real failure mode: image was built without
    #             dist/, an emptyDir volume shadowed it, or the COPY
    #             silently dropped files.
    # Neither probe depends on the backend — an api outage must NOT
    # mark the SPA pod unhealthy.
    location = /healthz/liveness {
      access_log off;
      default_type text/plain;
      return 200 "UP\n";
    }
    location = /healthz/readiness {
      access_log off;
      default_type text/plain;
      if (!-f /usr/share/nginx/html/index.html) {
        return 503 "SPA assets missing\n";
      }
      return 200 "UP\n";
    }

    # ---- block dotfiles ----
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
