# Included only when API_BACKEND_URL is set (entrypoint gates this).
# Three proxy paths to the creator-platform api service:
#   /api/         REST + WebSocket upgrade
#   /uploads/     direct static uploads served by the api
#   /socket.io/   Socket.IO WebSocket (separate WS_BACKEND_URL — defaults
#                 to API_BACKEND_URL when not set)
#
# Why `set $backend_url` + variable in proxy_pass:
#   nginx without a variable resolves the backend hostname at startup
#   and crashes if it doesn't resolve. The variable defers lookup to
#   per-request time; failed lookups return 502, the pod stays up.

    location /api/ {
      set $backend_url   "http://${API_BACKEND_URL}";
      proxy_pass         $backend_url;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Forwarded-Host  $host;
      proxy_buffering    off;
      proxy_request_buffering off;
      # Long timeout for WS / SSE / streaming.
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
      # Don't fail the request on a single connect/read error — let
      # the upstream surface the actual error to the client.
      proxy_next_upstream off;
    }

    location /uploads/ {
      set $backend_url   "http://${API_BACKEND_URL}";
      proxy_pass         $backend_url;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      set $backend_url   "http://${WS_BACKEND_URL}";
      proxy_pass         $backend_url;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_read_timeout 86400;
    }
