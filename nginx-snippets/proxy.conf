# Included only when API_BACKEND_URL is set (entrypoint gates this).
# Holds the http{}-scope plumbing the api-proxy.conf location blocks need:
# the WebSocket upgrade map and the DNS resolver.

  # WebSocket upgrade map. When a request carries `Upgrade: websocket`,
  # nginx sets `Connection: upgrade`; otherwise it closes the connection
  # so it can be pooled.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # DNS resolver — required because `proxy_pass` in api-proxy.conf uses
  # a variable (`$backend_url`). Without a variable, nginx resolves the
  # backend hostname at startup and CRASHES if it doesn't resolve
  # (backend not deployed yet, race during initial rollout). With a
  # variable + this resolver, nginx boots regardless and resolves per
  # request. Failed lookups return 502 to the client; the pod stays up.
  #
  # ${DNS_RESOLVER} is parsed from /etc/resolv.conf at container start
  # by docker-entrypoint.sh.
  resolver ${DNS_RESOLVER} valid=30s ipv6=off;
  resolver_timeout 5s;
